# ============================================================================
# Bee — MkDocs Material configuration
# The documentation website is built from the same Markdown that GitHub renders,
# so there is a single source of truth (no README/site drift).
#
#   pip install -r docs/requirements.txt
#   mkdocs serve       # live preview at http://127.0.0.1:8000
#   mkdocs build       # static site into ./site
# ============================================================================

site_name: Bee 🐝
site_url: https://bee.atomiq.rw/
site_description: >-
  The open-source AI knowledge hive. Learn AI engineering, LLMs, RAG, agents,
  prompting, and production patterns — with runnable examples and clear theory.
site_author: The Bee Contributors
copyright: >-
  Content licensed CC-BY-4.0 · Code licensed MIT · © 2026 The Bee Contributors

repo_name: bee-ai-labs/bee
repo_url: https://github.com/bee-ai-labs/bee
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - content.tooltips

plugins:
  - search
  - tags

markdown_extensions:
  # Callouts / admonitions (!!! note, ??? tip, etc.)
  - admonition
  - pymdownx.details
  # Mermaid diagrams, tabbed content, annotated code
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  # Rich prose
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.caret
  - footnotes
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bee-ai-labs/bee
    - icon: fontawesome/brands/discord
      link: https://discord.gg/bee-ai
      name: Join the hive on Discord
  tags:
    Beginner: beginner
    Intermediate: intermediate
    Advanced: advanced

# ----------------------------------------------------------------------------
# Navigation. Every entry maps to a real file — keep this in sync when adding
# pages (CI runs `mkdocs build --strict`, which fails on missing or orphan docs).
# ----------------------------------------------------------------------------
nav:
  - Home: index.md
  - Getting Started:
      - getting-started/index.md
      - Setup & Prerequisites: getting-started/setup.md
      - Your First LLM Call: getting-started/first-llm-call.md
  - Learning Paths:
      - learning-paths/index.md
  - Concepts:
      - concepts/index.md
      - How LLMs Work: concepts/how-llms-work.md
      - The Transformer: concepts/transformers.md
      - Tokenization: concepts/tokenization.md
      - Embeddings: concepts/embeddings.md
  - Prompting:
      - prompting/index.md
      - Prompt Engineering: prompting/prompt-engineering.md
      - System Prompts: prompting/system-prompts.md
      - Structured Outputs: prompting/structured-outputs.md
      - Function & Tool Calling: prompting/function-calling.md
  - RAG:
      - rag/index.md
      - Chunking: rag/chunking.md
      - Vector Databases: rag/vector-databases.md
      - Hybrid Search & Reranking: rag/hybrid-search-reranking.md
      - Evaluating RAG: rag/evaluation.md
  - Agents:
      - agents/index.md
      - Agent Fundamentals: agents/fundamentals.md
      - Memory: agents/memory.md
      - Multi-Agent Systems: agents/multi-agent.md
      - Model Context Protocol (MCP): agents/mcp.md
  - More Topics:
      - Vision: vision/index.md
      - Speech: speech/index.md
      - Evaluation: evaluation/index.md
      - Security: security/index.md
      - Deployment: deployment/index.md
      - MLOps: mlops/index.md
  - Contributing:
      - contributing/index.md
  - Reference:
      - Glossary: glossary.md
      - FAQ: faq.md
