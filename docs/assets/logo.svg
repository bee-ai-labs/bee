<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Bee logo">
  <defs>
    <linearGradient id="honey" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD54A"/>
      <stop offset="1" stop-color="#F5A623"/>
    </linearGradient>
  </defs>
  <!-- Honeycomb hexagon -->
  <polygon points="32,4 55,18 55,46 32,60 9,46 9,18"
           fill="url(#honey)" stroke="#8A5A00" stroke-width="2"/>
  <!-- Inner hex outline -->
  <polygon points="32,14 46,22 46,42 32,50 18,42 18,22"
           fill="none" stroke="#8A5A00" stroke-width="1.5" opacity="0.5"/>
  <!-- Bee body -->
  <g stroke="#3A2A00" stroke-width="2" stroke-linecap="round">
    <ellipse cx="32" cy="33" rx="9" ry="11" fill="#3A2A00"/>
    <line x1="24.5" y1="30" x2="39.5" y2="30" stroke="#FFD54A"/>
    <line x1="24" y1="35" x2="40" y2="35" stroke="#FFD54A"/>
  </g>
  <!-- Wings -->
  <g fill="#FFFFFF" opacity="0.85" stroke="#8A5A00" stroke-width="1">
    <ellipse cx="25" cy="24" rx="6" ry="4" transform="rotate(-25 25 24)"/>
    <ellipse cx="39" cy="24" rx="6" ry="4" transform="rotate(25 39 24)"/>
  </g>
</svg>
