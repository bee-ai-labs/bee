name: CI

# Quality gates for every push and pull request. These mirror the local checks
# documented in CONTRIBUTING.md so contributors can reproduce them.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Prettier (format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - run: npx --yes prettier@3 --check .

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules" "#site"

  spellcheck:
    name: cspell (spelling)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - run: npx --yes cspell@8 "**/*.md" --no-progress --show-suggestions

  links:
    name: Link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          # Emails are excluded by default in lychee v0.23+. Exclude our own org
          # (pages like Discussions/Projects may not be enabled yet), the not-yet-live
          # docs domain, chat invites, and local dev URLs used in examples/guides.
          # Retries + wait make the check resilient to transient network blips
          # (e.g. a remote host resetting the connection) instead of failing CI.
          args: >-
            --no-progress
            --max-retries 5
            --retry-wait-time 3
            --timeout 30
            --exclude 'bee-ai-labs'
            --exclude 'bee\.atomiq\.rw'
            --exclude 'localhost'
            --exclude '127\.0\.0\.1'
            --exclude 'example\.(com|org)'
            './**/*.md'
          fail: true

  docs-build:
    name: Build docs site (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r docs/requirements.txt
      - name: Build with --strict (fails on broken nav or bad refs)
        run: mkdocs build --strict
